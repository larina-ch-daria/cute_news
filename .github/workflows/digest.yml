name: weekly-digest
on:
  schedule:
    - cron: "0 17 * * 1"
  workflow_dispatch: {}   

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Send digest
        env:
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          ELEVEN_KEY: ${{ secrets.ELEVEN_KEY }}
          TELEGRAM_KEY: ${{ secrets.TELEGRAM_KEY }}
          admin_id: ${{ secrets.ADMIN_ID }}
          SUBSCRIBERS: ${{ secrets.SUBSCRIBERS }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          ELEVEN_VOICE_ID: ${{ vars.ELEVEN_VOICE_ID }}
          RSS_URL: ${{ vars.RSS_URL }}
          ELEVEN_STABILITY: ${{ vars.ELEVEN_STABILITY }}
          ELEVEN_SIMILARITY: ${{ vars.ELEVEN_SIMILARITY }}
          ELEVEN_STYLE: ${{ vars.ELEVEN_STYLE }}
          ELEVEN_SPEAKER_BOOST: ${{ vars.ELEVEN_SPEAKER_BOOST }}
        run: python send_digest.py