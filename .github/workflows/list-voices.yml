name: list-voices

# Одноразовая диагностика голосов ElevenLabs. Запускается только вручную.
on:
  workflow_dispatch: {}

jobs:
  voices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - env:
          ELEVEN_KEY: ${{ secrets.ELEVEN_KEY }}
        run: python list_voices.py
